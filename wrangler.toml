# Cloudflare Pages — pins the publish root to the Next static export.
# Without this, the dashboard may publish the repo root (`/`), so the site
# only appears under /out/ and `/` 404s.
#
# Dashboard (still required):
#   Build command: npm run build
#   Build output directory: out  (overridden by pages_build_output_dir below)
#   Root directory: /
#   Node version: 20 (see .nvmrc)
#
# Pages Functions live in /functions (project root). Apple Music proxy:
#   GET /api/apple-music/search
#   GET /api/apple-music/health
#
# Secrets (Pages → Settings → Environment variables, Production):
#   APPLE_TEAM_ID
#   APPLE_MUSIC_KEY_ID
#   APPLE_MUSIC_PRIVATE_KEY   (PEM; newlines as \n ok)
#   FRIEND_API_KEYS           (comma-separated)
#
# Local: copy .env.example → .dev.vars, then:
#   npm run build && npx wrangler pages dev out
#
# Keep `out/` committed as a fallback when the build step is skipped.
name = "verantyx-site"
compatibility_date = "2026-07-15"
pages_build_output_dir = "out"
